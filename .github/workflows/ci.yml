name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test-macos:
    name: Build and Test (macOS)
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test

  build-test-linux:
    name: Build and Test (Linux)
    runs-on: ubuntu-latest
    container: swift:5.10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test
